[project]
name = "grecohome-lakequery"
version = "0.1.0"
description = "Read-only DuckDB-over-Parquet HTTP query service for the data lake (Grafana backend)"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    # Stdlib http.server + DuckDB only — no web framework, minimal surface.
    "duckdb==1.5.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/grecohome_lakequery"]
