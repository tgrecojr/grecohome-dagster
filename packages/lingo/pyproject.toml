[project]
name = "grecohome-lingo"
version = "0.1.0"
description = "Lingo CGM data subject: bronze-only Dagster code location (Google Drive file capture)"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "grecohome-core",
    "dagster==1.13.10",
    # Google Drive access (service account). Integration deps that track upstream
    # API/client drift, so pinned >= (like tzdata), not ==.
    "google-api-python-client>=2.0.0",
    "google-auth>=2.0.0",
    "google-auth-httplib2>=0.2.0",
    "pydantic==2.13.4",
    "pydantic-settings==2.14.2",
    "structlog==26.1.0",
    "python-json-logger==4.1.0",
    "python-dotenv==1.2.2",
    "tzdata>=2026.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/grecohome_lingo"]
