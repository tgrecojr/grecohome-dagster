[project]
name = "grecohome-core"
version = "0.1.0"
description = "Shared framework for grecohome data-subject pipelines (bronze capture, rate limiting, token file store, Dagster helpers)"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "dagster==1.13.10",
    # Lets a run worker (DefaultRunLauncher runs execute inside the code-location
    # container) write to the host instance's Postgres event/run/schedule storage.
    "dagster-postgres==0.29.10",
    "pydantic==2.13.4",
    "pydantic-settings==2.14.2",
    "structlog==26.1.0",
    "python-json-logger==4.1.0",
    "python-dotenv==1.2.2",
    "tzdata>=2026.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/grecohome_core"]
