[project]
name = "grecohome-whoop"
version = "0.1.0"
description = "Whoop data subject: bronze-only Dagster code location"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "grecohome-core",
    "dagster==1.13.8",
    "httpx==0.28.1",
    "authlib==1.7.2",
    "tenacity==9.1.4",
    "pydantic==2.13.4",
    "pydantic-settings==2.14.1",
    "structlog==25.5.0",
    "python-json-logger==4.1.0",
    "python-dotenv==1.2.2",
    "tzdata>=2026.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/grecohome_whoop"]
