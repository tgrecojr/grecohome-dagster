[project]
name = "grecohome-gold"
version = "0.1.0"
description = "Gold layer: analysis marts (Dagster code location) derived from silver Parquet"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "grecohome-core",
    "dagster==1.13.8",
    "duckdb==1.5.3",
    "pydantic==2.13.4",
    "pydantic-settings==2.14.2",
    "structlog==26.1.0",
    "python-json-logger==4.1.0",
    "python-dotenv==1.2.2",
    "tzdata>=2026.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/grecohome_gold"]
