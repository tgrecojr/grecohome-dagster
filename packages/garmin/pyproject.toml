[project]
name = "grecohome-garmin"
version = "0.1.0"
description = "Garmin data subject: bronze-only Dagster code location"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "grecohome-core",
    "dagster==1.13.8",
    # Garmin Connect access is fully delegated to this library; it must track the
    # latest to follow Garmin's auth/API drift, so it is pinned >= (a data dep,
    # like tzdata), not ==.
    "garminconnect>=0.3.5",
    "pydantic==2.13.4",
    "pydantic-settings==2.14.1",
    "structlog==26.1.0",
    "python-json-logger==4.1.0",
    "python-dotenv==1.2.2",
    "tzdata>=2026.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/grecohome_garmin"]
