[project]
name = "grecohome-geocode"
version = "0.1.0"
description = "Geocode (Photon reverse-geocode cache) subject: bronze-only Dagster code location"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "grecohome-core",
    "dagster==1.13.10",
    # Sync HTTP client for the self-hosted Photon call (no auth). Pinned == like the
    # other application libs.
    "httpx==0.28.1",
    # Retry a transient Photon restart / network blip on a single reverse lookup.
    "tenacity==9.1.4",
    "pydantic==2.13.4",
    "pydantic-settings==2.14.2",
    "structlog==26.1.0",
    "python-json-logger==4.1.0",
    "python-dotenv==1.2.2",
    "tzdata>=2026.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/grecohome_geocode"]
