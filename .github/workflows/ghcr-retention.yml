name: GHCR retention

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC

permissions:
  packages: write
  contents: read

jobs:
  prune:
    name: Prune old GHCR versions
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # One package per data subject, plus the cross-subject silver and gold layers.
        subject: [whoop, garmin, lingo, soil, location, silver, gold]
    concurrency:
      group: ghcr-cleanup-${{ github.repository }}-${{ matrix.subject }}
    steps:
      - name: Prune GHCR (keep latest + 5 most recent tagged)
        uses: dataaxiom/ghcr-cleanup-action@v1.2.2
        with:
          packages: grecohome-dagster-${{ matrix.subject }}
          keep-n-tagged: 5
          exclude-tags: latest
          delete-untagged: true
